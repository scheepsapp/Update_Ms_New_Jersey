   <style>
        /* CSS VARIABELEN VAN DASHBOARD */
        :root {
            --primary-blue: #1e40af;
            --glow-blue: #3b82f6;
            --dark-bg: #020617;
            --glass: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-teal: #14b8a6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding-top: 100px;
        }

        /* ACHTERGROND STIJL */
        .bg-fixed {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('pic/Afbeelding van WhatsApp op 2025-11-06 om 12.27.07_d3198d5b.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
            filter: brightness(0.15) contrast(0.95) saturate(0.8);
        }

        /* NAVBAR STIJL */
        .navbar {
            height: 80px;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            padding: 0 40px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .navbar-title {
            font-weight: 900;
            font-size: 1.6rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 auto;
        }

        /* ADN PANEEL STYLING */
        .tool-panel {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 2.5rem;
            padding: 2.5rem;
            box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(59, 130, 246, 0.05);
            width: 100%;
            max-width: 800px;
            position: relative;
        }

        .panel-title {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: white;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1rem;
        }

        /* INPUTS & BUTTONS */
        .default-input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid var(--glass-border) !important;
            border-radius: 1rem !important;
            padding: 0.75rem 1rem;
            color: white !important;
            transition: 0.3s;
        }

        .default-input:focus {
            border-color: var(--glow-blue) !important;
            background: rgba(255, 255, 255, 0.1) !important;
            outline: none;
        }

        .btn-elegant-gradient {
            background: linear-gradient(135deg, var(--primary-blue) 0%, #1e3a8a 100%);
            color: white;
            border-radius: 1.5rem;
            padding: 1rem 2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-elegant-gradient:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(30, 64, 175, 0.4);
            border-color: var(--glow-blue);
        }

        #file-label {
            background: rgba(255,255,255,0.03);
            border: 2px dashed var(--glass-border);
            border-radius: 1.5rem;
            transition: 0.3s;

            border-color: var(--glow-blue);
            background: rgba(59, 130, 246, 0.05);

            border-radius: 1.5rem;

padding: 2px 10px;   /* Smallere padding voor minder hoogte */

<script>
document.addEventListener('DOMContentLoaded', function () {

    const body = document.body;
    const modeToggleLink = document.getElementById('mode-toggle-link');

    function switchMode(isLightMode) {
        if (!modeToggleLink) return;

        const iconSpan = modeToggleLink.querySelector('span:first-child');
        const textSpan = modeToggleLink.querySelector('span:last-child');

        if (isLightMode) {
            body.classList.add('light-mode');
            if (iconSpan) iconSpan.textContent = '🌙';
            if (textSpan) textSpan.textContent = 'Nacht Modus';
            localStorage.setItem('theme', 'light');
        } else {
            body.classList.remove('light-mode');
            if (iconSpan) iconSpan.textContent = '☀️';
            if (textSpan) textSpan.textContent = 'Dag Modus';
            localStorage.setItem('theme', 'dark');
        }
    }

    // opgeslagen thema toepassen
    const savedTheme = localStorage.getItem('theme');
    switchMode(savedTheme === 'light');

    // klik op dag/nacht knop
    if (modeToggleLink) {
        modeToggleLink.addEventListener('click', function (e) {
            e.preventDefault();
            switchMode(!body.classList.contains('light-mode'));
        });
    }

});

            const [hours, minutes] = timeString.split(':').map(Number);
            const dateObj = new Date(dateString + 'T' + timeString);
            dateObj.setMinutes(dateObj.getMinutes() + minutesToAdd);

                processButton.disabled = true;
                return;
            }
            
            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(file);
            fileInput.files = dataTransfer.files;
            
            fileNameSpan.textContent = file.name;
            processButton.disabled = false;
            resultDiv.innerHTML = '';
            reportButton.classList.add('hidden');
            
            processButton.click();
        }

        // DRAG AND DROP LISTENERS
        fileLabel.addEventListener('dragover', (event) => {
            event.preventDefault();
            fileLabel.style.borderColor = 'var(--glow-blue)';
            fileLabel.style.backgroundColor = 'rgba(59, 130, 246, 0.05)'; 
        });

        fileLabel.addEventListener('dragleave', (event) => {
            event.preventDefault();
            fileLabel.style.borderColor = 'var(--glass-border)';
            fileLabel.style.backgroundColor = 'transparent';
        });

        fileLabel.addEventListener('drop', (event) => {
            event.preventDefault();
            fileLabel.style.borderColor = 'var(--glass-border)';
            fileLabel.style.backgroundColor = 'transparent';

            const droppedFiles = event.dataTransfer.files;
            if (droppedFiles.length > 0) {
                startProcessing(droppedFiles[0]);
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                 startProcessing(fileInput.files[0]);
            }
        });

        processButton.addEventListener('click', () => {
            const file = fileInput.files[0];
            if (!file) return;

            processButton.disabled = true;
            loadingDiv.classList.remove('hidden');
            loadingDiv.classList.add('flex');
            resultDiv.innerHTML = '';
            reportButton.classList.add('hidden');

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const ediContent = event.target.result;
                    const segments = ediContent.split("'");

                    const locationData = {};
                    let currentLoadingLocation = 'Niet gespecificeerd';
                    let currentContainerNumber = null;

                    segments.forEach(segment => {
                        const trimmedSegment = segment.trim();

                        if (trimmedSegment.startsWith('TDT+20+')) {
                            const parts = trimmedSegment.split('+');
                            if (parts.length > 2) {
                                tripCode = parts[2].trim(); 
                            }
                        }
                        else if (trimmedSegment.startsWith('UNB+')) {
                            const parts = trimmedSegment.split('+');
                            if (parts.length > 5 && parts[5].startsWith('ZEM')) {
                                tripCode = parts[5].substring(3);
                            } 
                            else if (parts.length > 5) {
                                const referenceComponent = parts[parts.length - 1]; 
                                tripCode = referenceComponent.replace(/"/g, '').split(':')[0].trim();
                            }
                        }

                        if (trimmedSegment.startsWith('LOC+9+')) {
                            const parts = trimmedSegment.split('+');
                            let locCode = parts[2];
                            currentLoadingLocation = locationAbbreviations[locCode] || locCode;
                        }

                        if (trimmedSegment.startsWith('EQD+CN+')) {
                            const parts = trimmedSegment.split('+');
                            currentContainerNumber = parts[2];
                        }

                        if (trimmedSegment.startsWith('DGS+IMD+')) {
                            const parts = trimmedSegment.split('+');
                            if (parts.length > 3) {
                                const unNumber = parts[3];

                                if (unNumber && predefinedUnNumbers.has(unNumber) && currentContainerNumber) {
                                    if (!locationData[currentLoadingLocation]) {
                                        locationData[currentLoadingLocation] = {};
                                    }
                                    if (!locationData[currentLoadingLocation][currentContainerNumber]) {
                                        locationData[currentLoadingLocation][currentContainerNumber] = new Set();
                                    }
                                    locationData[currentLoadingLocation][currentContainerNumber].add(unNumber);
                                }
                            }
                        }
                    });

                    currentResults = locationData;
                    loadingDiv.classList.remove('flex');
                    loadingDiv.classList.add('hidden');
                    processButton.disabled = false;

                    let foundCount = 0;
                    let resultHtml = `<h2 class="text-2xl font-bold mb-6" style="color: var(--glow-blue);">Gevonden overeenkomsten voor ventilatievereisten:</h2>`;

                    const sortedLocations = Object.keys(locationData).sort();

                    if (sortedLocations.length > 0) {
                        for (const location of sortedLocations) {
                            const containers = locationData[location];
                            if (Object.keys(containers).length > 0) {
                                foundCount++;
                                resultHtml += `
                                    <div class="p-6 result-panel-box rounded-2xl shadow-sm mb-6">
                                        <div class="flex items-center mb-4">
                                            <svg class="w-6 h-6 text-teal-600 mr-2" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>
                                            <h3 class="text-xl font-bold text-teal-400">Laadplaats: ${location}</h3>
                                        </div>
                                        ${Object.entries(containers).map(([container, unNumbers]) => `
                                            <div class="p-4 result-panel-box-inner rounded-xl shadow-sm mb-3" style="background: rgba(255,255,255,0.02)">
                                                <p class="font-semibold">Containernummer: <span class="text-blue-400">${container}</span></p>
                                                <p class="text-sm text-gray-400 mt-2 mb-1">UN-nummers:</p>
                                                <ul class="flex flex-wrap gap-2 text-sm">
                                                    ${Array.from(unNumbers).map(un => `
                                                        <li>
                                                            UN ${un}
                                                        </li>
                                                    `).join('')}
                                                </ul>
                                            </div>
                                        `).join('')}
                                    </div>
                                `;
                            }
                        }
                    }

                    if (foundCount > 0) {
                        resultDiv.innerHTML = resultHtml;
                        resultDiv.className = 'mt-8';
                        reportButton.classList.remove('hidden');
                    } else {
                        resultDiv.innerHTML = `
                            <div class="bg-red-950/50 border border-red-500/30 p-6 rounded-xl shadow-lg">
                                <p class="text-red-400 font-semibold text-center">
                                    <span class="text-3xl">😢</span><br>Geen van de vooraf ingestelde UN-nummers is gevonden in het bestand.
                                </p>
                            </div>
                        `;
                        resultDiv.className = 'mt-8';
                    }
                } catch (error) {
                    loadingDiv.classList.remove('flex');
                    loadingDiv.classList.add('hidden');
                    processButton.disabled = false;
                    resultDiv.innerHTML = `
                        <div class="bg-red-950/50 border border-red-500/30 p-6 rounded-xl shadow-lg">
                            <p class="text-red-400 font-semibold text-center">
                                <span class="text-3xl">⚠️</span><br>Er is een fout opgetreden bij het verwerken van het bestand: ${error.message}
                            </p>
                        </div>
                    `;
                    resultDiv.className = 'mt-8';
                }
            };
            reader.readAsText(file);
        });

        reportButton.addEventListener('click', () => {
            if (Object.keys(currentResults).length === 0) {
                alert('Geen resultaten om te rapporteren.');
                return;
            }

            modalOptionsDiv.innerHTML = '';
            Object.keys(currentResults).sort().forEach(location => {
                const button = document.createElement('button');
                button.textContent = `Rapport voor ${location}`;
                button.className = 'w-full btn-elegant-gradient text-white font-semibold py-2 px-4 rounded-xl shadow-md focus:outline-none focus:ring-2 focus:ring-blue-500';
                button.onclick = () => {
                    selectedLocation = location;
                    terminalSelectionModal.style.display = 'none';
                    reportInputModal.style.display = 'flex';
                };
                modalOptionsDiv.appendChild(button);
            });
            terminalSelectionModal.style.display = 'flex';
        });

        closeTerminalModal.onclick = () => {
            terminalSelectionModal.style.display = 'none';
        };

        closeInputModal.onclick = () => {
            reportInputModal.style.display = 'none';
        };

        window.onclick = (event) => {
            if (event.target == terminalSelectionModal) {
                terminalSelectionModal.style.display = 'none';
            }
            if (event.target == reportInputModal) {
                reportInputModal.style.display = 'none';
            }
        };

        downloadFinalReportButton.addEventListener('click', () => {
            const meterName = meterNameInput.value;
            const reportDate = reportDateInput.value;
            const timeBeforeDeparture = timeBeforeDepartureInput.value;
            const timeAfterDeparture = timeAfterDepartureInput.value;

            if (!meterName || !reportDate || !timeBeforeDeparture || !timeAfterDeparture) {

            }

            generateAndDownloadReportHTML(selectedLocation, meterName, reportDate, timeBeforeDeparture, timeAfterDeparture, tripCode);
            reportInputModal.style.display = 'none';
        });

            tekenLayout(doc);

            // TITEL EN ONDERTITEL VERDER NAAR BENEDEN (Verschoven van Y=42 naar Y=52)
            doc.setTextColor(15, 23, 42);
            doc.setFont("helvetica", "bold");
            doc.setFontSize(22);
            doc.text("Ventilatie Rapport", 105, 52, { align: 'center' });

            doc.setFont("helvetica", "normal");
            doc.setFontSize(11);
            doc.setTextColor(107, 114, 128); 
            doc.text("Meetresultaten voor gasmeting", 105, 59, { align: 'center' });

            // Blauwe scheidingslijn (Verschoven van Y=55 naar Y=66)
            doc.setDrawColor(30, 58, 138);
            doc.setLineWidth(0.5);
            doc.line(15, 66, 195, 66);

            // Grijze Info Blok (Verschoven van Y=62 naar Y=74)
            doc.setFillColor(241, 245, 249); 
            doc.roundedRect(15, 74, 180, 24, 2, 2, 'F'); 

            doc.setFontSize(9);
            
            doc.setFont("helvetica", "bold"); doc.setTextColor(75, 85, 99);
            doc.text("Terminal:", 20, 81);
            doc.setFont("helvetica", "normal"); doc.setTextColor(15, 23, 42);
            doc.text(`${location}`, 40, 81);

            doc.setFont("helvetica", "bold"); doc.setTextColor(75, 85, 99);
            doc.text("Reiscode:", 110, 81);
            doc.setFont("helvetica", "normal"); doc.setTextColor(15, 23, 42);
            doc.text(`${tripCode}`, 130, 81);

            doc.setFont("helvetica", "bold"); doc.setTextColor(75, 85, 99);
            doc.text("Ve01:", 20, 90);
            doc.setFont("helvetica", "normal"); doc.setTextColor(15, 23, 42);
            doc.text(allUnNumbersString || 'Geen UN-nummers gevonden', 40, 90);

            doc.setFont("helvetica", "bold"); doc.setTextColor(75, 85, 99);
            doc.text("Datum:", 110, 90);
            doc.setFont("helvetica", "normal"); doc.setTextColor(15, 23, 42);
            doc.text(reportDate ? reportDate.split('-').reverse().join('-') : '-', 130, 90);

            const activeerSectieTitelStijl = (pdf, titel, yPos) => {
                pdf.setFont("helvetica", "bold");
                pdf.setFontSize(12);
                pdf.setTextColor(4, 120, 87); 
                pdf.setFillColor(4, 120, 87);
                pdf.rect(15, yPos - 4, 1.5, 5, 'F');
                pdf.text(titel, 18.5, yPos);
            };

            // Eerste Groene Sectietitel (Verschoven van Y=97 naar Y=112)
            activeerSectieTitelStijl(doc, "Na het laden, voor vertrek", 112);
            
            // Eerste Tabel startpositie (Verschoven van startY=102 naar startY=117)
            doc.autoTable({
                startY: 117,
                head: [['Ruim', 'OXY', 'LEL', 'Tijd', 'Datum', 'Naam']],
                body: dataBefore, 
                theme: 'striped',
                headStyles: { fillColor: [15, 23, 42], textColor: 255, fontStyle: 'bold' },
                styles: { font: "helvetica", fontSize: 9 },
                margin: { left: 15, right: 15, bottom: 20 },
                didDrawPage: function (data) {
                    if (data.pageNumber > 1) tekenLayout(doc);
                }
            });

            // Tweede Tabel
            let volgendeY = doc.lastAutoTable.finalY + 12;
            activeerSectieTitelStijl(doc, "1 uur na vertrek", volgendeY);
            doc.autoTable({
                startY: volgendeY + 5,
                head: [['Ruim', 'OXY', 'LEL', 'Tijd', 'Datum', 'Naam']],
                body: dataAfter, 
                theme: 'striped',
                headStyles: { fillColor: [15, 23, 42], textColor: 255, fontStyle: 'bold' },
                styles: { font: "helvetica", fontSize: 9 },
                margin: { left: 15, right: 15, bottom: 20 },
                didDrawPage: function (data) {
                    if (data.pageNumber > 1) tekenLayout(doc);
                }
            });

            doc.save(`ADN-Ventilatie-Rapport-${location}.pdf`);
        }
    });
</script>
</body>
</html>
